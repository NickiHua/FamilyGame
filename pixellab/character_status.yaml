# =============================================================================
# character_status.yaml  —  PixelLab sprite pipeline: status + MANUAL direction anchor
# =============================================================================
# THE ONE RULE (learned 2026-07-11):
#   PixelLab rotation directions are UNSTABLE and differ per character. There is
#   NO fixed offset formula ("counterclockwise off-by-one" was WRONG). After a
#   character's 8-direction rotation is generated, a HUMAN looks at the 8 PNGs
#   and MANUALLY anchors which PNG = front(S) / side(E) / back(N). Each
#   character's anchor is its own — never reuse another character's mapping.
#   !!! ANCHOR BY WHAT THE FRAME VISUALLY IS, NOT its PixelLab filename — a PNG
#   named "south" can visually be a SE, "east" can be the clean 45°, etc. The
#   filenames are unstable per character; only your eyes decide.
#   SIDE (E) = the VISUAL 45° 3/4 (SE) frame — NOT a near-profile. 45° reads
#   best for the side-view battle actions (FE-style) AND is what PixelLab most
#   reliably produces; used for BOTH map-walk side and battle actions.
#   One side (E or W) is the REAL generated PNG; the other side is its flipX
#   mirror. WHICH side is generated vs mirror is decided by the USER per
#   character after review — do NOT assume W is always the mirror of E.
#
# DIRECTIONS — TWO CONTEXTS (2026-07-12):
#   MAP (top-down):   idle = S ;  walk = S / N / E / W.
#   BATTLE (dedicated 45° side-view scene):  idle = SE / SW ;  walk = E / W ;
#     attack = SE / SW ;  react/hit/knockback/knockout = SE / SW.
#   => our GAME directions = S / N / E / W / SE / SW. Only 4 are GENERATED:
#     S (visual front), N (visual back), E (visual side — map+battle walk),
#     SE (visual 45° — battle poses). Mirrors: W = flipX(E), SW = flipX(SE).
#     S/N have no mirror.
#   `anchor` maps each OUR direction -> the pixellab VISUAL frame (by eye, NOT
#   filename). The pipeline COPIES that pixellab frame's animation and RENAMES
#   it to OUR direction under animations/<action>/<OURDIR>/. In Unity the folder
#   IS that OUR direction (e.g. our S), whatever pixellab frame it came from.
#   THIS YAML IS THE SOURCE OF TRUTH for that mapping.
#   All animations are generated ONLY for the anchored SOURCE dirs, then the
#   mirror side(s) are produced in post (flipX).
#
# STATES (char group vs char):
#   A character (group) can have multiple `states` = different jobs/classes.
#   EACH state is a SEPARATE PixelLab character (own prompt + character_id +
#   rotation + anchor + animations) — a job change is a whole new sprite set.
#   Allies will need several states (jobs). Enemies usually have just one.
#   PixelLab binds states via a shared `group_id` (that's why several states
#   show on ONE PixelLab webpage). We mirror it: char-level `group_id` (shared,
#   may be null if ungrouped), state-level `character_id` (unique per state).
#   NOTE: the API's GET /v2/characters?group_id=X filter is IGNORED (returns all,
#   paginated ~50) — list a group by client-side filtering on group_id.
#
# anchor:   OUR direction (S/N/E/W/SE/SW) -> pixellab VISUAL frame basename,
#           or "mirror:E" / "mirror:SE"
# status:   none | generating | done   (per rotation / per animation)
# =============================================================================

characters:
  - id: EmpireCaptain              # internal id == Unit DisplayName
    team: enemy
    group_id: null                 # not grouped on PixelLab (single state)
    portrait: art/portraits/empirecaptain/empirecaptain_full.png
    states:
      - state: base                # enemies: single state
        job: heavy_knight
        # 616 chars. GBA keyword dropped (2026-07-11): removing "Fire Emblem
        # GBA style" -> "Fire Emblem style" made PixelLab drop the head plume
        # naturally + slightly cleaner. Do NOT add "modern/high-res pixel"
        # words (they make it grow random gold horns). Let it go default.
        prompt: >-
          Fire Emblem style chibi enemy heavy knight, western fantasy,
          3-head-tall super-deformed, short stout body, small hands and feet,
          faceless elite imperial knight in full silver plate armor with gold
          trim and a gold cross on the chest, steel bascinet helm with lowered
          pointed visor and a small gold cross on the brow, narrow eye slit, no
          horns no plume, long flowing dark teal green cape from the shoulders,
          tall kite shield in left hand, dark teal with gold rim and a gold
          crowned eagle emblem, one-handed steel sword with brass crossguard in
          right hand pointed down, clean pixel art, vibrant colors, sharp
          silhouette
        character_id: e6084051-192e-4892-941e-2054a12b9d41
        rotation:
          status: done
          dir: pixellab/characters/empirecaptain/rotations
        # MANUAL anchor (user confirmed 2026-07-12, by VISUAL). our <-> pixellab:
        #   S  <-> south         (visual front)
        #   N  <-> north-west    (visual back, shows shield + gold eagle)
        #   E  <-> east          (visual side, map+battle walk)
        #   SE <-> south-east    (visual 45°, battle poses)
        #   W  <-> mirror:E      (flipX east)
        #   SW <-> mirror:SE     (flipX south-east)
        anchor:
          S: south
          N: north-west
          E: east
          SE: south-east
          W: mirror:E
          SW: mirror:SE
        # ACTION SET (2026-07-12): universal base = idle / walk / attack /
        # knockback / knockout. EmpireCaptain also has defense (char-specific).
        # dirs use GAME directions (mapped via anchor); mirrors auto (W=flipX E,
        # SW=flipX SE). idle [S,SE]. walk [S,N,E]. attack/knockback/knockout/
        # defense [SE] (battle 45°).
        # !!! F1 must NOT be idle: PixelLab ALWAYS prepends the rotation frame as
        # frame_000 (the idle rest), so the 8 described frames start AT motion.
        # DROPPED: react=forward flinch (PixelLab won't lean back for "react");
        # the Gemini "recoils bent backward -> returns upright" wording gives a
        # REAL backward knockback instead (see knockback). shieldbash + lookup
        # exist on PixelLab but are intentionally NOT tracked here.
        animations:
          idle:
            status: done
            frame_count: 8
            dirs: [S, SE]          # map idle S + battle idle SE (+SW = mirror SE)
            prompt: >-
              Heavy knight stands in a guard breathing pose.
              F1: chest begins to rise with breath, shoulders lift slightly.
              F2-3: chest continues rising, body slightly taller.
              F4: peak inhale.
              F5-6: chest falls, shoulders settle.
              F7: deepest exhale.
              F8: settles to a neutral guard breath.
              Feet stay planted, no walking, no spinning.
              Kite shield with gold eagle stays in left hand and sword in right
              hand every frame, never dropped or swapped.
              Bascinet helm stays on head, teal green cape hangs behind.
              Clean pixel art, sharp silhouette.
          walk:
            status: done
            frame_count: 8
            dirs: [S, N, E]        # map+battle walk (+W = mirror E)
            prompt: >-
              Heavy armored knight walks forward, already mid-stride, feet never
              both planted still.
              F1: right foot already lifted off the ground mid-step, body
              leaning forward, weight on the left leg.
              F2: right foot swings forward at peak knee lift, body rises, cape
              swings back.
              F3: right foot plants forward, weight shifts onto it, body bobs
              down.
              F4: left foot lifts off the ground, pushing the body forward.
              F5: left foot swings forward at peak knee lift, body rises, cape
              swings.
              F6: left foot plants forward, weight settles, body bobs down.
              F7: right foot lifts off again, continuing the cycle.
              F8: right foot mid-swing forward, ready to loop back to the start.
              Continuous marching walk cycle, high knee lifts, clear up-and-down
              body bob and weight shift every step, big weighted strides, teal
              cape sways, no idle pause, no spinning, no jumping, no sliding feet.
              Kite shield with gold eagle stays in left hand, sword carried low
              in right hand every frame, never raised, never dropped or swapped.
              Bascinet helm stays on head.
              Clean pixel art, sharp silhouette.
          attack:
            status: done
            frame_count: 8
            dirs: [SE]             # battle 45° (+SW = mirror SE)
            prompt: >-
              Heavy knight swings his sword down in a hard overhead slash.
              F1: raises the sword up and back over the right shoulder, shield
              up, weight shifts to the back foot.
              F2: sword rising toward full height, body coiling back.
              F3: sword at full height overhead, tension peak.
              F4: begins the downward chop, torso drives forward.
              F5: powerful downward slash at peak speed, sword sweeps down across
              the front, body lunges forward behind it.
              F6: sword follows through low to the side, full forward commitment.
              F7: recovers, pulls the sword back up.
              F8: settles to guard stance.
              Feet planted, no spinning, no jumping, no walking.
              Sword stays in right hand, kite shield in left hand, never dropped
              or swapped.
              Bascinet helm stays on head, teal cape trails the motion.
              Strong heavy weighted slash, clear windup and hard impact, clean
              pixel art, sharp silhouette.
          knockback:
            status: done
            frame_count: 8
            dirs: [SE]             # battle 45° (+SW = mirror SE)
            # Gemini-written (user 2026-07-12) — THIS produces a real BACKWARD
            # recoil that RETURNS to standing. KEY: "recoils, slightly bent
            # backward ... full return, upright" (NOT smashed/knocked-off-feet/
            # falls) avoids PixelLab's forward-crouch prior. Verbatim + id tail.
            prompt: >-
              Frame 1: Initial impact. Character recoils, slightly bent backward,
              expression of pain/surprise. Hands flinch, head jolts.
              Frames 2-3: Arc of the backward lunge. Character is pushed further
              back, torso angled steeply, legs braced but slightly bent for
              balance. Clothes/hair might flow slightly with the motion.
              Frames 4-5: Peak of the recoil. Most extreme backward position. May
              even slightly "skid" back. Torso fully arched.
              Frames 6-7: Beginning of the return. Torso starts to straighten,
              head tilts back forward. Legs begin to absorb the momentum.
              Frame 8: Full return. Character is back in a stable, upright
              standing pose, looking forward, recovered from the impact.
              Sword in right hand, kite shield in left hand, bascinet helm on
              head, teal cape. Clean pixel art, sharp silhouette.
          knockout:
            status: done
            frame_count: 8
            dirs: [SE]             # battle 45° (+SW = mirror SE)
            # Defeat / KO: ends DOWN on the ground (used for death). PixelLab
            # falls FORWARD (can't fall backward) — acceptable for a KO.
            prompt: >-
              Frame 1: a heavy impact lands, the body lurches, footing lost.
              Frames 2-3: knocked over, feet sliding out, arms flailing for
              balance, tipping toward the ground.
              Frames 4-5: the body falls and slams onto the ground, sprawling on
              impact.
              Frames 6-7: lying on the ground, sliding to a stop, limbs splayed,
              stunned.
              Frame 8: still down on the ground, dazed and defeated, does not get
              back up.
              Sword in right hand, kite shield in left hand, bascinet helm on
              head, teal cape. Clean pixel art, sharp silhouette.
          defense:                 # EmpireCaptain extra (NOT a universal base action)
            status: done
            frame_count: 8
            dirs: [SE]             # battle 45° (+SW = mirror SE)
            prompt: >-
              Heavy knight raises his shield to guard and holds a defensive
              stance.
              F1: brings the kite shield up and forward in front of the body to
              block.
              F2-3: shield fully raised covering the torso, body braces low
              behind it, sword tucked back.
              F4-5: holds the guard firmly, weight settled, minimal motion.
              F6-7: begins to lower the shield, easing out of the block.
              F8: settles back toward a neutral guard.
              Feet planted, no stepping, no spinning.
              Kite shield with gold eagle stays raised in left hand, sword in
              right hand, never dropped or swapped.
              Bascinet helm stays on head, teal cape behind.
              Clean pixel art, sharp silhouette.

  # ===========================================================================
  - id: SuYao                        # 苏瑶 — ally priestess/mage healer
    team: ally
    group_id: null                   # single state for now (job states later)
    portrait: art/portraits/suyao/suyao_full.png
    states:
      - state: base
        job: priestess
        # NOTE (2026-07-12, user): make a NO-HOOD version. !!! LESSON (oldest
        # record + reconfirmed 2026-07-12): do NOT mention "hood"/"cape" AT ALL,
        # not even negated ("no hood") — merely naming them makes PixelLab put
        # one ON, and "long hair" then drapes into the hood. So just DON'T say
        # the words. Do NOT slavishly copy the portrait's outfit (so a future
        # 立绘 change won't break the sprite). Only IDENTITY traits matter: 18yo
        # girl, long silver hair, blue eyes, white+gold holy robe, ornate staff
        # w/ blue crystal. Clothes may differ from the portrait.
        prompt: >-
          Fire Emblem style chibi ally priestess mage girl, western fantasy,
          3-head-tall super-deformed, short stout body, small hands and feet,
          an 18-year-old girl with a gentle youthful face and clear blue eyes,
          very long straight silver-white hair with bangs, wearing a simple
          flowing white and gold holy robe with a belted sash and long sleeves,
          holding a tall ornate golden staff topped with a faceted blue teardrop
          crystal, clean pixel art, vibrant colors, sharp silhouette
        # character_id REPLACED 2026-07-15 (user): new rotation batch. Old #6
        # (29bf913f) retired. anchor RESET — must re-anchor by VISUAL review of
        # the NEW rotation (pixellab/characters/suyao/_contact.png). animations
        # status kept at none (prompts retained, regenerate after re-anchor).
        character_id: 8d241f54-52a1-4c1d-a8a7-522b3d29903d
        rotation:
          status: done
          dir: pixellab/characters/suyao/rotations
        # MANUAL anchor (user 2026-07-16, VISUAL). user gave S/N/SE; E reuses SE;
        # W=flipX E, SW=flipX SE.
        anchor:
          S: south-east
          N: north-west
          E: east
          SE: east
          W: mirror:E
          SW: mirror:SE
        # ACTION SET: universal base = idle / walk / attack / knockback /
        # knockout (attack = staff cast for a mage). dirs = GENERATED sources
        # (mapped via anchor); mirrors auto-made (W=flipX E, SW=flipX SE).
        #   idle  [S, SE]  (map S + battle SE; +SW mirror)
        #   walk  [S, N, E] (map+battle walk; +W mirror)
        #   attack/knockback/knockout [SE] (battle; +SW mirror)
        # F1 must NOT be idle (frame_000 auto rotation start).
        animations:
          idle:
            status: done
            frame_count: 8
            dirs: [S, SE]          # map idle S + battle idle SE (+SW = mirror SE)
            prompt: >-
              Silver-haired priestess stands in a calm breathing idle, holding
              her staff.
              F1: chest begins to rise with breath, shoulders lift slightly.
              F2-3: chest continues rising, body slightly taller, hair settles.
              F4: peak inhale.
              F5-6: chest falls, shoulders settle.
              F7: deepest exhale.
              F8: settles to a neutral standing breath.
              Feet stay planted, no walking, no spinning, mouth stays closed the
              whole time, do not open the mouth.
              The tall golden staff with the blue crystal stays held in her hands
              every frame, never dropped or swapped.
              Long silver hair and white robe gently sway.
              Clean pixel art, sharp silhouette.
          walk:
            status: done
            frame_count: 8
            dirs: [S, N, E]        # map+battle walk (+W = mirror E)
            prompt: >-
              Young priestess walks forward, already mid-stride, feet never both
              planted still.
              F1: right foot lifted mid-step, body leaning forward.
              F2: right foot swings forward at peak knee lift, body rises, hair
              and robe sway back.
              F3: right foot plants, weight shifts, body bobs down.
              F4: left foot lifts, pushing the body forward.
              F5: left foot swings forward at peak lift, body rises.
              F6: left foot plants, body bobs down.
              F7: right foot lifts again, continuing the cycle.
              F8: right foot mid-swing, ready to loop.
              Continuous walk cycle, clear up-and-down bob and weight shift, no
              idle pause, no sliding feet, no spinning.
              The golden staff with the blue crystal carried upright in her hand
              every frame, never dropped. Long silver hair and white robe sway.
              Clean pixel art, sharp silhouette.
          attack:
            status: done
            frame_count: 8
            dirs: [SE]             # battle 45° (+SW = mirror SE)
            # !!! NO baked VFX (user 2026-07-13): sprite must have NO glow/light/
            # magic/particles — VFX is overlaid separately. Only body + staff
            # move; crystal stays plain/unlit. Heavy negatives below.
            prompt: >-
              Priestess casts a spell with her staff, feet planted, only body and
              staff move, mouth closed.
              F1: she raises the staff upward.
              F2: staff rising higher, free hand lifting, body drawing up tall.
              F3: staff at the top of the raise, a brief hold.
              F4: she brings the staff down and points it forward ahead of her.
              F5: staff at full forward point, body leaning into the cast.
              F6: holds the forward-pointing cast pose.
              F7: draws the staff back upright, recovering.
              F8: settles to a calm standing stance.
              Feet planted, no walking, no spinning. Plain golden staff with a
              plain unlit blue crystal in her hands every frame, never dropped.
              NO glow, NO light, NO sparkles, NO flash, NO aura, NO particles —
              the crystal does NOT light up.
              Silver hair and white robe move naturally.
              Clean pixel art, sharp silhouette.
          knockback:
            status: done
            frame_count: 8
            dirs: [SE]             # battle 45° (+SW = mirror SE)
            # Proven backward-recoil wording (see EmpireCaptain knockback):
            # understated "recoils slightly bent backward" + "full return
            # upright", NEVER smashed/falls/prone. Identity tail swapped.
            prompt: >-
              Frame 1: Initial impact. Character recoils, slightly bent backward,
              expression of pain/surprise. Hands flinch, head jolts.
              Frames 2-3: Arc of the backward lunge. Character is pushed further
              back, torso angled steeply, legs braced but slightly bent for
              balance. Hair and robe flow with the motion.
              Frames 4-5: Peak of the recoil. Most extreme backward position. May
              even slightly "skid" back. Torso fully arched.
              Frames 6-7: Beginning of the return. Torso starts to straighten,
              head tilts back forward. Legs begin to absorb the momentum.
              Frame 8: Full return. Character is back in a stable, upright
              standing pose, looking forward, recovered from the impact.
              Golden staff with blue crystal held in her hands, long silver hair,
              white robe. Clean pixel art, sharp silhouette.
          knockout:
            status: done
            frame_count: 8
            dirs: [SE]             # battle 45° (+SW = mirror SE)
            prompt: >-
              Frame 1: a heavy impact lands, the body lurches, footing lost.
              Frames 2-3: knocked over, feet sliding out, arms flailing for
              balance, tipping toward the ground.
              Frames 4-5: the body falls and slams onto the ground, sprawling on
              impact.
              Frames 6-7: lying on the ground, sliding to a stop, limbs splayed,
              stunned.
              Frame 8: still down on the ground, dazed and defeated, does not get
              back up.
              Golden staff with blue crystal, long silver hair, white robe.
              Clean pixel art, sharp silhouette.

  # ===========================================================================
  - id: EmpireCavalier               # 帝国骑兵 — enemy cavalry knight (tier-1 mook)
    team: enemy
    group_id: null
    portrait:                        # no portrait yet
    states:
      - state: base
        job: heavy_cavalry
        # NOTE (2026-07-12, user): the earlier attempt
        # (pixellab char a7b8e319-f80a-4440-a428-69d03b4d4b44) was not ideal.
        # Look reference = EmpireCaptain (imperial silver+gold+teal knight) BUT:
        #   - helm HAS a plume/翎羽 this time (still a closed faceless 覆面盔)
        #   - mounted on a BLACK horse (骑黑马)
        #   - LONG LANCE (长枪) — must say LARGE/OVERSIZED or PixelLab draws it tiny
        #   - heavy CAVALRY, NO shield (盾去掉)
        # !!! FIX (2026-07-12): first run drew a stray SECOND half-lance. Cause =
        # the redundant trailing "oversized thick lance" clause. Collapsed the
        # lance to ONE explicit mention ("a single large long cavalry lance
        # upright in the right hand"). Rest is gacha — reroll if it dupes again.
        prompt: >-
          Fire Emblem style chibi enemy heavy cavalry knight commander mounted
          on a black warhorse, western fantasy, super-deformed chibi rider with
          short stout body and small hands, faceless elite imperial knight in
          full silver plate armor with gold trim, closed steel full-face helm
          with a lowered visor and a tall flowing dark teal green plume crest,
          long flowing dark teal green cape, no shield, holding a single large
          long cavalry lance upright in the right hand, the black horse in dark
          teal and gold barding, clean pixel art, vibrant colors, sharp
          silhouette
        # character_id ADOPTED 2026-07-13 = cav#2 (1debb144). User reviewed 8
        # candidates: !!! #3-#7 all had a BROKEN LANCE (half-lance / lance split
        # into two), and d6976147 had the lance CLIPPING through the body in N +
        # a crooked lance in S. Only cav#2 has S / N / SE all correct AND no
        # clipping. Trade-off (user-accepted): cav#2's plate is less imposing +
        # the horse has NO barding — it's a TIER-1 cavalry MOOK (level 1: captain
        # leads, knights are小兵). A barded-horse 「骑士长」 commander = FUTURE variant
        # (this prompt above is kept as that aspirational reference; cav#2 the
        # actual sprite is lighter and differs from it).
        # !!! REPLACED 2026-07-20 (user): 1debb144 (cav#2) had bad output +
        # a broken prompt. New rotation 1bdc21ba — a HEAVY-CAVALIER-look lance
        # knight (imperial silver plate + gold + teal plume/cape) but holding a
        # LONG LANCE. anchor + animations reworked to match EmpireHeavyCavalier.
        character_id: 1bdc21ba-cc6c-46f8-b88b-22c693ea6bd2
        rotation:
          status: done
          dir: pixellab/characters/empirecavalier/rotations
        # MANUAL anchor (user 2026-07-20, by VISUAL on new rotation 1bdc21ba).
        # This is the MIRROR of EmpireHeavyCavalier: the clean 45° frame
        # (pixellab `south`) faces screen-LEFT here, so it anchors our W/SW and
        # E/SE are the flipX mirror. Front(S)=east, back(N)=west.
        #   S <-> east   N <-> west   W <-> south   SW <-> south (45°)
        #   E <-> mirror:W   SE <-> mirror:SW
        anchor:
          S: east
          N: west
          E: mirror:W
          SE: mirror:SW
          W: south
          SW: south
        # animations 2026-07-20: MOUNTED plumed lance knight (like
        # EmpireHeavyCavalier but a LANCE, attack = mounted forward lance thrust).
        # New conventions: no "Clean pixel art" tail; knockout = fall off horse +
        # eyes closed, no weapon scatter. dirs use the real (non-mirror) sources:
        # idle [S,SW]  walk [S,N,W]  battle [SW]  (E/SE auto-mirrored).
        animations:
          idle:
            status: done
            frame_count: 8
            dirs: [S, SW]
            prompt: >-
              Armored lance knight sits mounted on his warhorse in a calm idle,
              holding his lance upright.
              F1: the rider's chest and the horse's body rise gently with a slow
              breath.
              F2-3: rider eases slightly, the horse's head bobs a little.
              F4: peak of the breath.
              F5-6: rider settles, the horse lowers its head slightly.
              F7: settles low.
              F8: returns to a neutral mounted rest.
              The horse stays in place, no walking, no galloping, no rearing.
              Long lance held upright in his right hand every frame, plumed
              silver helm, teal cape, dark warhorse.
          walk:
            status: done
            frame_count: 8
            dirs: [S, N, W]
            prompt: >-
              The armored lance knight rides his warhorse forward at a walk,
              already mid-stride, the horse's legs never all planted.
              F1: the horse's front legs mid-step, body moving forward, rider
              bobbing gently.
              F2: front leg reaches forward, horse's body rises, teal cape sways.
              F3: front hoof plants, weight shifts, rider bobs down.
              F4: rear legs push the horse forward.
              F5: the horse strides forward at full step, rider rising.
              F6: hooves plant, rider bobs down.
              F7: front legs lift again, continuing the gait.
              F8: mid-stride, ready to loop.
              Continuous horse walk cycle, forward stride and gentle rider bob,
              no galloping, no rearing, no sliding hooves. Long lance upright in
              his right hand, plumed helm, teal cape.
          attack:
            status: done
            frame_count: 8
            dirs: [SW]
            # 2026-07-20: pixellab can't do a clean lance THRUST (esp. side view)
            # → attack is an overhead lance CHOP/slash instead (like the heavy
            # cavalry sword overhead slash, but swinging the long lance).
            prompt: >-
              Armored lance knight swings his long lance down in a hard overhead
              chop while mounted, the horse holding position.
              F1: raises the lance up and back over the right shoulder, body
              coiling.
              F2: lance rising to full height overhead, tension peak.
              F3: lance at the top, the horse braces.
              F4: begins the downward chop, torso driving forward over the
              horse's neck.
              F5: powerful downward chop, the lance sweeps down across the front,
              rider leaning forward.
              F6: lance follows through low to the side.
              F7: recovers, pulls the lance back up.
              F8: settles upright in the saddle to a guard.
              The horse stays in place, no galloping. Long lance in his right hand
              every frame, plumed silver helm, teal cape, dark warhorse.
          knockback:
            status: done
            frame_count: 8
            dirs: [SW]
            prompt: >-
              Frame 1: Initial impact. The mounted knight recoils, slightly bent
              backward in the saddle, the horse flinching back.
              Frames 2-3: rider and horse pushed further back, the horse's head
              jerking up, rider's torso angled back. Teal cape flows.
              Frames 4-5: peak of the recoil, the horse steps back, rider leaning
              steeply back.
              Frames 6-7: begins to return, rider straightens, horse settles
              forward.
